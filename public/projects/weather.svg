<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartbar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.7)" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.2)" />
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <line x1="0" y1="85" x2="600" y2="85" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="0" y1="170" x2="600" y2="170" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="0" y1="255" x2="600" y2="255" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="340" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="340" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Sun -->
  <circle cx="300" cy="115" r="30" fill="rgba(255,220,50,0.85)"/>
  <line x1="300" y1="72" x2="300" y2="64" stroke="rgba(255,220,50,0.9)" stroke-width="3" stroke-linecap="round"/>
  <line x1="300" y1="158" x2="300" y2="166" stroke="rgba(255,220,50,0.9)" stroke-width="3" stroke-linecap="round"/>
  <line x1="257" y1="115" x2="249" y2="115" stroke="rgba(255,220,50,0.9)" stroke-width="3" stroke-linecap="round"/>
  <line x1="343" y1="115" x2="351" y2="115" stroke="rgba(255,220,50,0.9)" stroke-width="3" stroke-linecap="round"/>
  <line x1="270" y1="85" x2="264" y2="79" stroke="rgba(255,220,50,0.9)" stroke-width="3" stroke-linecap="round"/>
  <line x1="330" y1="145" x2="336" y2="151" stroke="rgba(255,220,50,0.9)" stroke-width="3" stroke-linecap="round"/>
  <line x1="330" y1="85" x2="336" y2="79" stroke="rgba(255,220,50,0.9)" stroke-width="3" stroke-linecap="round"/>
  <line x1="270" y1="145" x2="264" y2="151" stroke="rgba(255,220,50,0.9)" stroke-width="3" stroke-linecap="round"/>
  <!-- Temp badge -->
  <rect x="360" y="85" width="100" height="60" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="410" y="118" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">28°C</text>
  <text x="410" y="136" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.75)" text-anchor="middle">Sunny</text>
  <!-- Chart bars -->
  <rect x="110" y="180" width="32" height="40" rx="4" fill="url(#chartbar1)"/>
  <rect x="152" y="165" width="32" height="55" rx="4" fill="url(#chartbar1)"/>
  <rect x="194" y="155" width="32" height="65" rx="4" fill="url(#chartbar1)"/>
  <rect x="236" y="170" width="32" height="50" rx="4" fill="url(#chartbar1)"/>
  <rect x="278" y="160" width="32" height="60" rx="4" fill="url(#chartbar1)"/>
  <!-- Day labels -->
  <text x="126" y="232" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle">Mon</text>
  <text x="168" y="232" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle">Tue</text>
  <text x="210" y="232" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle">Wed</text>
  <text x="252" y="232" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle">Thu</text>
  <text x="294" y="232" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle">Fri</text>
  <!-- Title -->
  <text x="300" y="278" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle" opacity="0.95">Weather Dashboard</text>
  <text x="300" y="300" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">JavaScript · Chart.js · OpenWeather API</text>
</svg>
