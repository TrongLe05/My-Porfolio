<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <line x1="0" y1="85" x2="600" y2="85" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="0" y1="170" x2="600" y2="170" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="0" y1="255" x2="600" y2="255" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="340" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="340" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Kanban board -->
  <rect x="100" y="80" width="100" height="170" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="250" y="80" width="100" height="170" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="400" y="80" width="100" height="170" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Column headers -->
  <text x="150" y="100" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle">TO DO</text>
  <text x="300" y="100" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle">IN PROGRESS</text>
  <text x="450" y="100" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle">DONE</text>
  <!-- Cards col 1 -->
  <rect x="110" y="110" width="80" height="30" rx="5" fill="rgba(255,255,255,0.25)"/>
  <rect x="110" y="148" width="80" height="30" rx="5" fill="rgba(255,255,255,0.2)"/>
  <rect x="110" y="186" width="80" height="30" rx="5" fill="rgba(255,255,255,0.2)"/>
  <!-- Cards col 2 -->
  <rect x="260" y="110" width="80" height="30" rx="5" fill="rgba(255,255,255,0.25)"/>
  <rect x="260" y="148" width="80" height="30" rx="5" fill="rgba(255,255,255,0.2)"/>
  <!-- Cards col 3 -->
  <rect x="410" y="110" width="80" height="30" rx="5" fill="rgba(255,255,255,0.25)"/>
  <rect x="410" y="148" width="80" height="30" rx="5" fill="rgba(255,255,255,0.25)"/>
  <rect x="410" y="186" width="80" height="30" rx="5" fill="rgba(255,255,255,0.2)"/>
  <!-- Checkmark -->
  <polyline points="422,200 428,206 440,194" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="422,162 428,168 440,156" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Title -->
  <text x="300" y="278" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle" opacity="0.95">Task Management App</text>
  <text x="300" y="300" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">React · Firebase · Tailwind CSS</text>
</svg>
