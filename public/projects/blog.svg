<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <line x1="0" y1="85" x2="600" y2="85" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="0" y1="170" x2="600" y2="170" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="0" y1="255" x2="600" y2="255" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="340" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="340" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Browser frame -->
  <rect x="90" y="60" width="420" height="195" rx="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="90" y="60" width="420" height="30" rx="10" fill="rgba(255,255,255,0.18)"/>
  <rect x="90" y="80" width="420" height="10" fill="rgba(255,255,255,0.18)"/>
  <circle cx="110" cy="75" r="5" fill="rgba(255,100,100,0.8)"/>
  <circle cx="128" cy="75" r="5" fill="rgba(255,200,50,0.8)"/>
  <circle cx="146" cy="75" r="5" fill="rgba(50,220,80,0.8)"/>
  <!-- Blog post content mockup -->
  <!-- Featured image area -->
  <rect x="105" y="100" width="390" height="80" rx="5" fill="rgba(255,255,255,0.1)"/>
  <!-- Blog post title line -->
  <rect x="115" y="192" width="250" height="12" rx="3" fill="rgba(255,255,255,0.55)"/>
  <!-- Text lines -->
  <rect x="115" y="212" width="370" height="7" rx="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="115" y="224" width="340" height="7" rx="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="115" y="236" width="290" height="7" rx="3" fill="rgba(255,255,255,0.3)"/>
  <!-- Tag / Read more button -->
  <rect x="115" y="250" width="60" height="18" rx="9" fill="rgba(255,255,255,0.25)"/>
  <text x="145" y="263" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)" text-anchor="middle">Read more</text>
  <!-- Pen icon in featured image -->
  <line x1="285" y1="155" x2="315" y2="125" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <line x1="285" y1="155" x2="279" y2="161" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
  <line x1="291" y1="149" x2="297" y2="155" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Title -->
  <text x="300" y="285" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle" opacity="0.95">Blog Platform</text>
  <text x="300" y="307" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">Next.js · PostgreSQL · Prisma</text>
</svg>
